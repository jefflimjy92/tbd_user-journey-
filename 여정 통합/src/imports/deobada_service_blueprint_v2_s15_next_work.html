function normalizeSourceTitleKey(value) {
  return String(value || '')
    .replace(/[📎⚖️🤝📄]/g, ' ')
    .replace(/\[[^\]]*\]/g, ' ')
    .replace(/[()]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim()
    .toLowerCase();
}

function collectSourcePairsFromRows(rows) {
  const pairs = [];
  (Array.isArray(rows) ? rows : []).forEach((row) => {
    const title = String(row?.title || '').trim();
    const url = String(row?.url || '').trim();
    if (title && url) pairs.push([title, normalizeSourceUrl(url)]);
  });
  return pairs;
}

function buildSourceLookup(pairs) {
  const rawMap = Object.create(null);
  const normalizedBuckets = Object.create(null);
  const urlTitleMap = Object.create(null);

  pairs.forEach(([title, url]) => {
    if (!title || !url) return;
    const normalizedUrl = normalizeSourceUrl(url);
    rawMap[title] = rawMap[title] || normalizedUrl;
    urlTitleMap[normalizedUrl] = urlTitleMap[normalizedUrl] || title;
    const key = normalizeSourceTitleKey(title);
    if (!key) return;
    if (!normalizedBuckets[key]) normalizedBuckets[key] = new Set();
    normalizedBuckets[key].add(normalizedUrl);
  });

  const normalizedMap = Object.create(null);
  Object.entries(normalizedBuckets).forEach(([key, bucket]) => {
    if (bucket.size === 1) normalizedMap[key] = Array.from(bucket)[0];
  });

  return { rawMap, normalizedMap, urlTitleMap };
}

const SOURCE_LOOKUP_SEED = collectSourcePairsFromRows(REFUND_VARIANT_BASE.sourceRows);
const SOURCE_URL_LOOKUP = buildSourceLookup(SOURCE_LOOKUP_SEED);
const CSV_SOURCE_TITLE_URL_MAP = SOURCE_URL_LOOKUP.rawMap;
const CSV_SOURCE_URL_TITLE_MAP = SOURCE_URL_LOOKUP.urlTitleMap;
const CSV_SOURCE_ALLOWED_URLS = new Set(
  SOURCE_LOOKUP_SEED
    .map(([, url]) => normalizeSourceUrl(url))
    .filter(Boolean)
);

function isAllowedSourceUrl(rawUrl) {
  const normalized = normalizeSourceUrl(rawUrl);
  if (!normalized) return false;
  return CSV_SOURCE_ALLOWED_URLS.has(normalized);
}

function resolveStrictSourceEntry(title, fallbackUrl = '') {
  const rawTitle = String(title || '').trim();
  const normalizedFallbackUrl = normalizeSourceUrl(fallbackUrl || '');

  if (rawTitle && CSV_SOURCE_TITLE_URL_MAP[rawTitle]) {
    const matchedUrl = normalizeSourceUrl(CSV_SOURCE_TITLE_URL_MAP[rawTitle]);
    return [rawTitle, matchedUrl];
  }

  const normalizedKey = normalizeSourceTitleKey(rawTitle);
  if (normalizedKey && SOURCE_URL_LOOKUP.normalizedMap[normalizedKey]) {
    const matchedUrl = normalizeSourceUrl(SOURCE_URL_LOOKUP.normalizedMap[normalizedKey]);
    const canonicalTitle = CSV_SOURCE_URL_TITLE_MAP[matchedUrl] || rawTitle;
    return [canonicalTitle, matchedUrl];
  }

  if (normalizedFallbackUrl && CSV_SOURCE_ALLOWED_URLS.has(normalizedFallbackUrl)) {
    const canonicalTitle =
      CSV_SOURCE_URL_TITLE_MAP[normalizedFallbackUrl]
      || rawTitle
      || deriveSourceTitleFromUrl(normalizedFallbackUrl)
      || '업무소스';
    return [canonicalTitle, normalizedFallbackUrl];
  }

  return [rawTitle, ''];
}

function resolveStrictSourceUrl(title, fallbackUrl = '') {
  return resolveStrictSourceEntry(title, fallbackUrl)[1];
}

function resolveSourceUrlByTitle(title) {
  const rawTitle = String(title || '').trim();
  if (!rawTitle) return '';
  if (CSV_SOURCE_TITLE_URL_MAP[rawTitle]) return normalizeSourceUrl(CSV_SOURCE_TITLE_URL_MAP[rawTitle]);

  const normalizedKey = normalizeSourceTitleKey(rawTitle);
  if (!normalizedKey) return '';
  if (SOURCE_URL_LOOKUP.normalizedMap[normalizedKey]) return SOURCE_URL_LOOKUP.normalizedMap[normalizedKey];
  return '';
}

function hydrateVariantLinks(variantBase) {
  const variant = deepClone(variantBase || {});
  const supplements = Array.isArray(variant.sourceSupplements) ? variant.sourceSupplements : [];
  supplements.forEach((lane) => {
    if (!lane || !Array.isArray(lane.cells)) return;
    lane.cells = lane.cells.map((cell) => {
      const [title, desc, tags, links] = normalizeCell(cell);
      const hydratedLinks = (Array.isArray(links) ? links : []).map((entry) => {
        if (!Array.isArray(entry) || entry.length < 1) return ['', ''];
        const linkTitle = String(entry[0] || '').trim();
        const explicitUrl = normalizeSourceUrl(entry[1] || '');
        if (!linkTitle && !explicitUrl) return ['', ''];
        return resolveStrictSourceEntry(linkTitle, explicitUrl);
      }).filter(([linkTitle]) => !!linkTitle);
      return [title, desc, tags, hydratedLinks];
    });
  });
  variant.sourceSupplements = supplements;
  return variant;
}

function ensureColorToken(value, fallbackIndex = 0) {
  if (typeof value === 'string' && /^pg-\d+$/.test(value)) return value;
  return `pg-${(fallbackIndex % 7) + 1}`;
}

function buildPhaseDefsFromLegacyGroups(groups) {
  return (Array.isArray(groups) ? groups : []).map((group, idx) => {
    const [key, name] = Array.isArray(group) ? group : [`P${idx + 1}`, `Phase ${idx + 1}`];
    return {
      key: String(key || `P${idx + 1}`),
      name: String(name || `Phase ${idx + 1}`),
      colorToken: ensureColorToken(`pg-${idx + 1}`, idx)
    };
  });
}

function buildStagesFromLegacy(phasesInput, groupsInput) {
  const phaseDefsInput = buildPhaseDefsFromLegacyGroups(groupsInput);
  const fallbackPhaseKey = phaseDefsInput[0]?.key || 'P1';
  const spans = (Array.isArray(groupsInput) ? groupsInput : []).map((group) => {
    const span = Number(Array.isArray(group) ? group[2] : 0);
    return Number.isFinite(span) && span > 0 ? span : 1;
  });
  let groupIdx = 0;
  let consumedInGroup = 0;

  return (Array.isArray(phasesInput) ? phasesInput : []).map((phase, idx) => {
    if (groupIdx < spans.length && consumedInGroup >= spans[groupIdx]) {
      groupIdx += 1;
      consumedInGroup = 0;
    }
    const phaseKey = (Array.isArray(groupsInput) && groupsInput[groupIdx] && groupsInput[groupIdx][0]) || fallbackPhaseKey;
    consumedInGroup += 1;
    const idLabel = String(Array.isArray(phase) ? (phase[0] || `S${idx + 1}`) : `S${idx + 1}`);
    const name = String(Array.isArray(phase) ? (phase[1] || idLabel) : idLabel);
    return {
      key: `stage-${idx + 1}-${idLabel}-${name}`.replace(/\s+/g, '_'),
      idLabel,
      name,
      phaseKey
    };
  });
}

function normalizeLaneCells(lanesInput, stageCount) {
  return (Array.isArray(lanesInput) ? lanesInput : []).map((lane) => {
    const cells = Array.isArray(lane?.cells) ? lane.cells.slice(0, stageCount) : [];
    while (cells.length < stageCount) {
      cells.push(['—', '', [], []]);
    }
    return {
      ...lane,
      cells
    };
  });
}

function buildPhaseGroupsFromStages(stagesInput, phaseDefsInput) {
  const phaseDefMap = new Map((Array.isArray(phaseDefsInput) ? phaseDefsInput : []).map((p) => [p.key, p]));
  const groups = [];
  (Array.isArray(stagesInput) ? stagesInput : []).forEach((stage) => {
    const phaseKey = stage?.phaseKey || groups[groups.length - 1]?.[0] || 'P1';
    const phaseName = phaseDefMap.get(phaseKey)?.name || phaseKey;
    const last = groups[groups.length - 1];
    if (last && last[0] === phaseKey) {
      last[2] += 1;
    } else {
      groups.push([phaseKey, phaseName, 1]);
    }
  });
  return groups;
}

function ensureStageReflectedLength(reflectedInput, stageCount) {
  const reflected = Array.isArray(reflectedInput) ? reflectedInput.slice(0, stageCount) : [];
  while (reflected.length < stageCount) {
    reflected.push('기존 본문 유지 + 업무소스 보강');
  }
  return reflected;
}

    baselineCells: deepClone(variant.baselineCells || {}),
    sourceRows: deepClone(variant.sourceRows || [])
  };
}

function moveItem(array, fromIndex, toIndex) {
  if (!Array.isArray(array)) return;
  if (fromIndex === toIndex) return;
  if (fromIndex < 0 || toIndex < 0 || fromIndex >= array.length || toIndex >= array.length) return;
  const [item] = array.splice(fromIndex, 1);
  array.splice(toIndex, 0, item);
}

function insertItem(array, index, value) {
  if (!Array.isArray(array)) return;
  const safeIndex = Math.max(0, Math.min(index, array.length));
  array.splice(safeIndex, 0, value);
}

function removeItem(array, index) {
  if (!Array.isArray(array)) return;
  if (index < 0 || index >= array.length) return;
  array.splice(index, 1);
}

function getNextStageIdLabel() {

  const maxValue = numbers.length ? Math.max(...numbers) : stages.length;
  return `S${maxValue + 1}`;
}

  return ['—', '', []];

function normalizeCell(cell) {
  const [title, desc, tags, links] = Array.isArray(cell) ? cell : ['—', '', [], []];
  return [title || '—', desc || '', Array.isArray(tags) ? tags : [], Array.isArray(links) ? links : []];
}

function isBlankCellTitle(title) {
  return !title || title === '—' || title === '빈칸' || title === '자동 처리' || title === '대기';
}

function mapSourceRowToStageIndex(row) {
  const raw = Number(row?.stage_raw);
  const text = `${row?.title || ''} ${row?.stage_name || ''} ${row?.checklist || ''} ${row?.notes || ''}`.toLowerCase();

  if (!Number.isFinite(raw)) return null;
  if (raw === 1) return 4; // S5
  if (raw === 2) return 5; // S6
  if (raw === 3) return 6; // S7
  if (raw === 4) {
    if (/(예약|tm)/.test(text)) return 7; // S8
    if (/(사전|가설계|브리핑|필터)/.test(text)) return 8; // S9
    if (/(미팅|진단|코칭)/.test(text)) return 9; // S10
    return 10; // S11
  }
  if (raw === 5) {
    if (/(계약|서명|클로징|핀셋|비교설명|설계)/.test(text)) return 10; // S11
    if (/(인계|체크리스트)/.test(text)) return 11; // S12
    if (/(1차|접수|분석|콜)/.test(text)) return 12; // S13
    if (/(발급|위탁|서류발급)/.test(text)) return 13; // S14
    return 14; // S15
  }
  if (raw === 6) {
    if (/(지급|환급|입금)/.test(text)) return 15; // S16
    if (/(정산|사후|마감|결산)/.test(text)) return 16; // S17
    if (/(소개|가족|재유입|referral)/.test(text)) return 17; // S18
    return 18; // S19
  }
  return null; // 단계 0, 11~20 제외
}

function rebuildSourceRowStageLinks() {
  sourceRowStageLinks = phases.map(() => []);
  (Array.isArray(sourceRows) ? sourceRows : []).forEach((row) => {
    const idx = mapSourceRowToStageIndex(row);
    if (idx === null || !row?.url || idx < 0 || idx >= phases.length) return;
    sourceRowStageLinks[idx].push([row.title || '업무소스', row.url]);
  });
}

function collectStageLinks(stageIndex) {
  const links = [];
  const seen = new Set();

  sourceSupplements.forEach((lane) => {
    const cell = lane.cells[stageIndex];
    if (!Array.isArray(cell) || !Array.isArray(cell[3])) return;
    cell[3].forEach((item) => {
      if (!Array.isArray(item) || item.length < 1) return;
      const lt = String(item[0] || '').trim();
      const lu = String(item[1] || '').trim();
      if (!lt) return;
      const key = `${lt}@@${lu}`;
      if (!seen.has(key)) {
        seen.add(key);
        links.push([lt, lu]);
      }
    });
  });

  (sourceRowStageLinks[stageIndex] || []).forEach(([lt, lu]) => {
    if (!lt) return;
    const key = `${lt}@@${lu || ''}`;
    if (!seen.has(key)) {
      seen.add(key);
      links.push([lt, lu || '']);
    }
  });

  return links.slice(0, 3);
}

function mergeLaneCells(laneId, laneCells) {
  const baselineLane = baselineCells[laneId] || [];
  return Array.from({ length: phases.length }, (_, idx) => {
    const [bt, bd, btags] = normalizeCell([...(baselineLane[idx] || ['—', '', []]), []]);
    const [st, sd, stags, slinks] = normalizeCell(laneCells[idx] || ['—', '', [], []]);

    const hasBase = !isBlankCellTitle(bt);
    const hasSrc = !isBlankCellTitle(st);

    const title = hasBase ? bt : (hasSrc ? st : '—');
    const desc = hasBase ? bd : (hasSrc ? sd : '');
    const tags = (Array.isArray(btags) && btags.length) ? btags : (Array.isArray(stags) ? stags : []);

    const dedup = [];
    const seen = new Set();
    (Array.isArray(slinks) ? slinks : []).forEach((item) => {
      if (!Array.isArray(item) || item.length < 1) return;
      const lt = String(item[0] || '').trim();
      const lu = String(item[1] || '').trim();
      if (!lt) return;
      const key = `${lt}@@${lu}`;
      if (!seen.has(key)) {
        seen.add(key);
        dedup.push([lt, lu]);
      }
    });

    const finalLinks = dedup.length
      ? dedup.slice(0, 3)
      : (activeBlueprintType === 'refund3y' ? collectStageLinks(idx) : []);
    return [title, desc, tags, finalLinks];
  });
}

function rebuildRuntimeArtifacts() {
  rebuildSourceRowStageLinks();

  const mergedCells = Object.fromEntries(
    sourceSupplements.map((lane) => [lane.id, mergeLaneCells(lane.id, lane.cells)])
  );

  lanes = sourceSupplements.map((lane) => ({
    ...lane,
    cells: mergedCells[lane.id] || lane.cells
  }));

  notionEvidenceMap = phases.map((phase, idx) => {
    const links = [];
    const seen = new Set();

    lanes.forEach((lane) => {
      const cell = lane.cells[idx] || ['—', '', [], []];
      const sourceLinks = Array.isArray(cell[3]) ? cell[3] : [];
      sourceLinks.forEach(([title, url]) => {
        if (!title) return;
        const key = `${title}@@${url || ''}`;
        if (!seen.has(key)) {
          seen.add(key);
          links.push([title, url || '']);
        }
      });
    });

    return {
      stage: `${phase[0]} ${phase[1]}`,
      pages: links.slice(0, 5),
      reflected: stageReflected[idx] || '기존 본문 유지 + 업무소스 보강'
    };
  });

  phaseMeta = [];
  const phaseDefMap = new Map((Array.isArray(phaseDefs) ? phaseDefs : []).map((phase) => [phase.key, phase]));
  phaseGroups.forEach(([phaseKey, , span], i) => {
    const colorToken = ensureColorToken(phaseDefMap.get(phaseKey)?.colorToken, i);
    for (let j = 0; j < span; j += 1) {
      phaseMeta.push({ group: i + 1, phaseKey, colorToken });
    }
  });
}

function normalizeSourceUrl(rawUrl) {
  const value = String(rawUrl || '').trim();
  if (!value) return '';
  try {
    const u = new URL(value);
    const host = u.hostname.toLowerCase();
    if (host.includes('notion.so') || host.includes('notion.site')) {
      u.search = '';
      u.hash = '';
    }
    return u.toString();
  } catch (_err) {
    return value;
  }
}

function deriveSourceTitleFromUrl(rawUrl) {
  const fallback = 'Notion 페이지';
  const value = String(rawUrl || '').trim();
  if (!value) return fallback;
  try {
    const u = new URL(value);
    const segments = u.pathname.split('/').filter(Boolean);
    if (!segments.length) return fallback;
    let candidate = decodeURIComponent(segments[segments.length - 1] || '').trim();
    candidate = candidate.replace(/-[0-9a-f]{32}$/i, '');
    candidate = candidate.replace(/-[0-9a-f]{8}(?:-[0-9a-f]{4}){3}-[0-9a-f]{12}$/i, '');
    candidate = candidate.replace(/-/g, ' ').replace(/\s+/g, ' ').trim();
    if (!candidate || /^[0-9a-f-]{32,36}$/i.test(candidate)) {
      if (segments.length >= 2) {
        candidate = decodeURIComponent(segments[segments.length - 2] || '')
          .replace(/-/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }
    }
    if (!candidate || /^[0-9a-f-]{32,36}$/i.test(candidate)) return fallback;
    return candidate;
  } catch (_err) {
    return fallback;
  }
}

function sanitizeSourceLinks(links) {
  if (!Array.isArray(links)) return [];
  return links
    .map((entry) => {
      if (!Array.isArray(entry)) return ['', ''];
      const normalizedUrl = normalizeSourceUrl(entry[1] || '');
      const explicitTitle = String(entry[0] || '').trim();
      const autoTitle = normalizedUrl ? deriveSourceTitleFromUrl(normalizedUrl) : '';
      return resolveStrictSourceEntry(explicitTitle || autoTitle, normalizedUrl);
    })
    .filter(([title, url]) => {
      if (!title) return false;
      if (url) return true;
      return !shouldHideUnmatchedSourceEntries();
    })
    .slice(0, 20);
}

function getSourceLinksFromCell(cell) {
  if (!(cell instanceof Element)) return [];
  const links = Array.from(cell.querySelectorAll('.source-item .cell-link'));
  return links
    .map((link) => {
      const title = (link.textContent || '').trim();
      const href = (link.getAttribute('href') || '').trim();
      return [title, href];
    })
    .filter(([title]) => !!title);
}

function renderSourceCellContent(cell, links) {
  if (!(cell instanceof Element)) return;
  const validLinks = sanitizeSourceLinks(links);
  const hasMissingLinks = validLinks.some(([, url]) => !url);

  cell.classList.remove('empty');
  cell.classList.remove('has-missing-links');
  cell.innerHTML = '';

  if (!validLinks.length) {
    cell.classList.add('empty');
    cell.textContent = '—';
  } else {
    if (hasMissingLinks) cell.classList.add('has-missing-links');
    const sourceTitle = document.createElement('div');
    sourceTitle.className = 'source-row-title';
    sourceTitle.textContent = '업무소스';
    cell.appendChild(sourceTitle);

    const linksWrap = document.createElement('div');
    linksWrap.className = 'source-links';

    validLinks.forEach(([title, url], index) => {
      const item = document.createElement('span');
      item.className = 'source-item';

      if (url) {
        const anchor = document.createElement('a');
        anchor.className = 'cell-link notion-link';
        anchor.href = url;
        anchor.target = '_blank';
        anchor.rel = 'noopener noreferrer';
        anchor.textContent = title;
        item.appendChild(anchor);
      } else {
        const textChip = document.createElement('span');
        textChip.className = 'cell-link missing-link';
        textChip.textContent = title;
        item.appendChild(textChip);
      }

      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'source-remove-btn';
      removeBtn.dataset.index = String(index);
      removeBtn.title = '업무소스 삭제';
      removeBtn.textContent = '×';
      item.appendChild(removeBtn);

      linksWrap.appendChild(item);
    });

    cell.appendChild(linksWrap);
  }

  const addBtn = document.createElement('button');
  addBtn.type = 'button';
  addBtn.className = 'source-add-btn';
  addBtn.title = '업무소스 추가';
  addBtn.textContent = '+';
  cell.appendChild(addBtn);
}

function normalizeUiCell(cell) {
  const value = Array.isArray(cell) ? cell : ['—', '', [], []];
  const title = value[0] || '—';
  const desc = value[1] || '';
  const tags = Array.isArray(value[2]) ? value[2] : [];
  const links = Array.isArray(value[3]) ? value[3] : [];
  return [title, desc, tags, links];
}

function isEmptyUiCellTitle(title) {
  return !title || title === '—' || title === '자동 처리' || title === '대기' || title === '빈칸';
}

function uniqTags(...tagGroups) {
  const map = new Map();
  tagGroups.flat().forEach((tag) => {
    if (!Array.isArray(tag) || tag.length < 2) return;
    const key = `${tag[0]}@@${tag[1]}`;
    if (!map.has(key)) map.set(key, [tag[0], tag[1]]);
  });
  return Array.from(map.values());
}

function uniqLinks(...linkGroups) {
  const map = new Map();
  linkGroups.flat().forEach((link) => {
    if (!Array.isArray(link) || link.length < 2 || !link[0]) return;
    const key = `${link[0]}@@${link[1] || ''}`;
    if (!map.has(key)) map.set(key, [link[0], link[1] || '']);
  });
  return Array.from(map.values()).slice(0, 3);
}

function buildTouchActionHtml(touchpoint, action) {
  const blocks = [];
  if (touchpoint) {
    blocks.push(`<div class="ta-line"><div class="ta-label">[접점]</div><div class="ta-value">${touchpoint}</div></div>`);
  }
  if (action) {
    blocks.push(`<div class="ta-line"><div class="ta-label">[행동]</div><div class="ta-value">${action}</div></div>`);
  }
  return blocks.join('');
}

function buildTouchActionDescHtml(title, desc) {
  const rawTitle = String(title || '').trim();
  const rawDesc = String(desc || '').trim();
  if (rawDesc.includes('class="ta-line"')) return rawDesc;

  let touchpoint = '';
  let action = '';

  const taggedMatch = rawDesc.match(/접점\s*[:：]?\s*(.*?)\s*행동\s*[:：]?\s*(.*)/);
  if (taggedMatch) {
    touchpoint = (taggedMatch[1] || '').trim();
    action = (taggedMatch[2] || '').trim();
  }

  if ((!touchpoint && !action) && rawTitle.includes(' · ')) {
    const parts = rawTitle.split(' · ').map((part) => part.trim()).filter(Boolean);
    touchpoint = parts[0] || '';
    action = parts[1] || '';
  }

  if ((!touchpoint && !action) && rawDesc) {
    const lines = rawDesc.split(/\n+/).map((line) => line.trim()).filter(Boolean);
    if (lines.length >= 2) {
      touchpoint = lines[0];
      action = lines[1];
    }
  }

  if (!touchpoint && !action) {
    touchpoint = rawTitle || rawDesc;
  }

  return buildTouchActionHtml(touchpoint, action);
}

function mergeTopCustomerLanes(peLane, caLane) {
  const pickSummaryText = (title, desc, isEmpty) => {
    if (!isEmpty && title && title !== '—') return String(title).trim();
    if (!desc) return '';
    const normalized = String(desc).replace(/\s+/g, ' ').trim();
    return normalized.split(/[.!?]/)[0].trim();
  };

  const maxLen = Math.max(peLane.cells.length, caLane.cells.length);
  const cells = Array.from({ length: maxLen }, (_, idx) => {
    const [peTitle, peDesc, peTags, peLinks] = normalizeUiCell(peLane.cells[idx]);
    const [caTitle, caDesc, caTags, caLinks] = normalizeUiCell(caLane.cells[idx]);
    const peEmpty = isEmptyUiCellTitle(peTitle);
    const caEmpty = isEmptyUiCellTitle(caTitle);

    if (peEmpty && caEmpty) return ['—', '', [], []];

    const touchpointText = pickSummaryText(peTitle, peDesc, peEmpty);
    const actionText = pickSummaryText(caTitle, caDesc, caEmpty);
    const title = [peEmpty ? '' : peTitle, caEmpty ? '' : caTitle].filter(Boolean).join(' · ');

    return [
      title || '—',
      buildTouchActionHtml(touchpointText, actionText),
      uniqTags(peTags, caTags),
      uniqLinks(peLinks, caLinks)
    ];
  });

  return {
    id: 'cx',
    cls: 'lane-cx',
    label: ['고객 접점/행동', 'Customer Touchpoint & Actions', '고객 통합 레이어'],
    cells
  };
}

  const ordered = preferredOrder.filter((laneId) => available.has(laneId));
  lanes.forEach((lane) => {
    if (!ordered.includes(lane.id) && lane.id !== 'pe' && lane.id !== 'ca') {
      ordered.push(lane.id);

  });
  return ordered;
}

}

  }
  if (noteEl && variant?.note) noteEl.textContent = variant.note;
  if (evidenceSubEl && variant?.evidenceSub) evidenceSubEl.textContent = variant.evidenceSub;
}

function captureScrollAnchor() {
  if (!containerEl || !grid) return null;
  const maxScrollLeft = Math.max(0, containerEl.scrollWidth - containerEl.clientWidth);
  const maxScrollTop = Math.max(0, containerEl.scrollHeight - containerEl.clientHeight);
  const centerX = containerEl.scrollLeft + (containerEl.clientWidth / 2);
  const phaseCells = Array.from(grid.querySelectorAll('.phase-cell[data-stage-key]'));

  let closestCell = null;
  let minDistance = Number.POSITIVE_INFINITY;
  phaseCells.forEach((cell) => {
    const left = cell.offsetLeft;
    const width = cell.offsetWidth || 1;
    const cellCenter = left + (width / 2);
    const distance = Math.abs(cellCenter - centerX);
    if (distance < minDistance) {
      minDistance = distance;
      closestCell = cell;
    }
  });

  const stageIndex = closestCell ? Number(closestCell.dataset.stageIndex) : 0;
  const cellCenter = closestCell ? (closestCell.offsetLeft + (closestCell.offsetWidth / 2)) : centerX;

  return {
    scrollLeft: containerEl.scrollLeft,
    scrollTop: containerEl.scrollTop,
    stageKey: closestCell?.dataset.stageKey || '',
    stageIndex: Number.isFinite(stageIndex) ? stageIndex : 0,
    centerDeltaX: centerX - cellCenter,
    ratioX: maxScrollLeft > 0 ? containerEl.scrollLeft / maxScrollLeft : 0,
    ratioY: maxScrollTop > 0 ? containerEl.scrollTop / maxScrollTop : 0
  };
}

function restoreScrollAnchor(anchor) {
  if (!anchor || !containerEl || !grid) return;

  const maxScrollLeft = Math.max(0, containerEl.scrollWidth - containerEl.clientWidth);
  const maxScrollTop = Math.max(0, containerEl.scrollHeight - containerEl.clientHeight);
  const phaseCells = Array.from(grid.querySelectorAll('.phase-cell[data-stage-key]'));

  let targetCell = null;
  if (anchor.stageKey) {
    targetCell = phaseCells.find((cell) => cell.dataset.stageKey === anchor.stageKey) || null;
  }
  if (!targetCell && phaseCells.length) {
    const safeIndex = Math.max(0, Math.min(Number(anchor.stageIndex) || 0, phaseCells.length - 1));
    targetCell = phaseCells[safeIndex];
  }

  let targetLeft = Number(anchor.scrollLeft) || 0;
  if (targetCell) {
    const cellCenter = targetCell.offsetLeft + ((targetCell.offsetWidth || 1) / 2);
    targetLeft = cellCenter - (containerEl.clientWidth / 2) + (Number(anchor.centerDeltaX) || 0);
  } else if (Number.isFinite(anchor.ratioX)) {
    targetLeft = anchor.ratioX * maxScrollLeft;
  }

  let targetTop = Number(anchor.scrollTop) || 0;
  if (Number.isFinite(anchor.ratioY)) {
    targetTop = Math.min(Math.max(targetTop, 0), maxScrollTop);
    if (!Number.isFinite(anchor.scrollTop)) targetTop = anchor.ratioY * maxScrollTop;
  }

  containerEl.scrollLeft = Math.min(Math.max(targetLeft, 0), maxScrollLeft);
  containerEl.scrollTop = Math.min(Math.max(targetTop, 0), maxScrollTop);
}

function restoreScrollAnchorAfterRender(anchor) {
  if (!anchor) return;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      restoreScrollAnchor(anchor);
    });
  });
}

function getStageIndexByKey(stageKey) {
  if (!stageKey) return -1;
  return stages.findIndex((stage) => stage?.key === stageKey);
}

function reindexStageKeys() {
  stages = stages.map((stage, idx) => ({
    ...stage,
    key: String(stage?.key || `stage-${idx + 1}`)
  }));
}

function rebuildAfterStageStructureChange(anchor = null) {
  syncLegacyFromNormalizedState();
  renderBlueprintGrid();
  restoreScrollAnchorAfterRender(anchor);
}

function moveStageWithinPhase(fromIndex, toIndex) {
  if (!Number.isInteger(fromIndex) || !Number.isInteger(toIndex)) return false;
  if (fromIndex === toIndex) return false;
  if (fromIndex < 0 || toIndex < 0 || fromIndex >= stages.length || toIndex >= stages.length) return false;
  if (stages[fromIndex]?.phaseKey !== stages[toIndex]?.phaseKey) return false;

  moveItem(stages, fromIndex, toIndex);
  lanesModel.forEach((lane) => moveItem(lane.cells, fromIndex, toIndex));
  Object.keys(baselineCells || {}).forEach((laneId) => {
    const laneCells = baselineCells[laneId];
    if (Array.isArray(laneCells)) moveItem(laneCells, fromIndex, toIndex);
  });
  moveItem(stageReflected, fromIndex, toIndex);
  sourceRows = [];
  reindexStageKeys();
  return true;
}

function addStageAfterIndex(index) {
  if (!Number.isInteger(index) || index < 0 || index >= stages.length) return false;
  const baseStage = stages[index];
  const newStage = {
    key: `stage-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
    idLabel: getNextStageIdLabel(),
    name: '신규 단계',
    phaseKey: baseStage?.phaseKey || phaseDefs[0]?.key || 'P1'
  };

  insertItem(stages, index + 1, newStage);
  lanesModel.forEach((lane) => insertItem(lane.cells, index + 1, getDefaultStageCell()));
  Object.keys(baselineCells || {}).forEach((laneId) => {
    const laneCells = baselineCells[laneId];
    if (Array.isArray(laneCells)) insertItem(laneCells, index + 1, getDefaultBaselineCell());
  });
  insertItem(stageReflected, index + 1, '운영지표 모니터링');
  sourceRows = [];
  reindexStageKeys();
  return true;
}

function removeStageAtIndex(index) {
  if (!Number.isInteger(index) || index < 0 || index >= stages.length) return false;
  if (stages.length <= 1) return false;

  removeItem(stages, index);
  lanesModel.forEach((lane) => removeItem(lane.cells, index));
  Object.keys(baselineCells || {}).forEach((laneId) => {
    const laneCells = baselineCells[laneId];
    if (Array.isArray(laneCells)) removeItem(laneCells, index);
  });
  removeItem(stageReflected, index);
  sourceRows = [];
  reindexStageKeys();
  return true;
}

function getStructureDraftPayload() {
  return {
    phaseDefs: deepClone(phaseDefs),
    stages: deepClone(stages),
    lanes: deepClone(lanesModel),
    stageReflected: deepClone(stageReflected),
    baselineCells: deepClone(baselineCells)
  };
}

function applyStructureDraftPayload(structurePayload, options = {}) {
  if (!structurePayload || typeof structurePayload !== 'object') return false;
  const normalized = normalizeVariantForRuntime({
    phaseDefs: structurePayload.phaseDefs,
    stages: structurePayload.stages,
    lanes: structurePayload.lanes,
    stageReflected: structurePayload.stageReflected,
    baselineCells: structurePayload.baselineCells,
    key: activeBlueprintType
  });

  phaseDefs = deepClone(normalized.phaseDefs || []);
  stages = deepClone(normalized.stages || []);
  lanesModel = normalizeLaneCells(normalized.lanes || [], stages.length);
  stageReflected = ensureStageReflectedLength(normalized.stageReflected, stages.length);
  baselineCells = deepClone(normalized.baselineCells || {});

  const anchor = options.anchor || null;
  rebuildAfterStageStructureChange(anchor);
  return true;
}

function renderBlueprintGrid() {
  if (Array.isArray(stages) && stages.length) {
    syncLegacyFromNormalizedState();
  }
  if (grid) grid.innerHTML = '';
  const evidenceRoot = document.getElementById('evidenceTable');
  if (evidenceRoot) evidenceRoot.innerHTML = '';

  document.documentElement.style.setProperty('--phase-count', String(Math.max(1, phases.length)));

  rebuildRuntimeArtifacts();

  addPhaseGroups();
  addPhaseHeader();

  const mergedCustomerLane = mergeTopCustomerLanes(lanes[0] || { cells: [] }, lanes[1] || { cells: [] });
  addLane(mergedCustomerLane);

  const laneMap = new Map(lanes.map((lane) => [lane.id, lane]));
  const teamLaneOrder = getTeamLaneRenderOrder();
  let prevLane = mergedCustomerLane;

  teamLaneOrder.forEach((laneId) => {
    const lane = laneMap.get(laneId);
    if (!lane) return;
    addDivider(buildDividerForTransition(prevLane, lane));
    addLanePair(lane);
    prevLane = lane;
  });

  renderNotionEvidence();
}

function switchBlueprint(typeKey, options = {}) {
  const anchor = options.anchor || null;
  const base = BLUEPRINT_VARIANTS[typeKey] || BLUEPRINT_VARIANTS.refund3y;
  const variant = normalizeVariantForRuntime(hydrateVariantLinks(base));
  activeBlueprintType = variant.key || typeKey || 'refund3y';
  activeVariantMeta = variant;

  phaseDefs = deepClone(variant.phaseDefs || []);
  stages = deepClone(variant.stages || []);
  lanesModel = normalizeLaneCells(variant.lanes || [], stages.length);
  stageReflected = ensureStageReflectedLength(variant.stageReflected, stages.length);
  baselineCells = deepClone(variant.baselineCells || {});
  sourceRows = deepClone(variant.sourceRows || []);
  syncLegacyFromNormalizedState();

  applyVariantMeta(variant);
  setActiveViewButton(activeBlueprintType);
  renderBlueprintGrid();
  restoreScrollAnchorAfterRender(anchor);
}

const EDITABLE_SELECTOR = [
  '.header h1',
  '.header > p',
  '.phase-group-label',
  '.phase-group-name',
  '.phase-label',
  '.phase-id',
  '.phase-name',
  '.lane-name-kr',
  '.lane-name-en',
  '.lane-team',
  '.title',
  '.desc',
  '.source-row-title',
  '.tag',
  '.divider-label',
  '.note'
].join(', ');

const DRAFT_KEY_BASE = 'deobada_blueprint_v29_inline_draft';

function getDraftKey() {
  return `${DRAFT_KEY_BASE}__${activeBlueprintType}`;
}
const toggleEditBtn = document.getElementById('toggleEditBtn');
const toggleStageEditBtn = document.getElementById('toggleStageEditBtn');
const saveDraftBtn = document.getElementById('saveDraftBtn');
const resetDraftBtn = document.getElementById('resetDraftBtn');
const exportHtmlBtn = document.getElementById('exportHtmlBtn');
const editorStatus = document.getElementById('editorStatus');
let editEnabled = true;
let saveTimer = null;

function setStageEditMode(enabled) {
  stageEditEnabled = !!enabled;
  if (toggleStageEditBtn) {
    toggleStageEditBtn.textContent = `단계 편집: ${stageEditEnabled ? 'ON' : 'OFF'}`;
  }
  const anchor = captureScrollAnchor();
  renderBlueprintGrid();
  restoreScrollAnchorAfterRender(anchor);
  setEditMode(editEnabled);
}

function getEditableNodes() {
  return Array.from(document.querySelectorAll(EDITABLE_SELECTOR));
}

function serializeEditableNodes() {
  return getEditableNodes().map((node) => {
    const richHtml = node.classList.contains('desc-touch-action');
    return {
      mode: richHtml ? 'html' : 'text',
      value: richHtml ? node.innerHTML : node.textContent
    };
  });
}

function applyEditableNodeSnapshot(snapshot) {
  const nodes = getEditableNodes();
  if (!Array.isArray(snapshot) || snapshot.length !== nodes.length) return false;
  snapshot.forEach((item, idx) => {
    const node = nodes[idx];
    if (!node) return;
    if (item && typeof item === 'object' && item.mode === 'html') {
      node.innerHTML = typeof item.value === 'string' ? item.value : '';
      return;
    }
    const textValue = typeof item === 'string'
      ? item
      : (item && typeof item.value === 'string' ? item.value : '');
    node.textContent = textValue;
  });
  return true;
}

function getSourceRowCells() {
  return Array.from(document.querySelectorAll('.cell.source-row[data-source-cell-key]'));
}

function getSourceDraftMap() {
  const map = {};
  getSourceRowCells().forEach((cell) => {
    const key = cell.dataset.sourceCellKey;
    if (!key) return;
    map[key] = getSourceLinksFromCell(cell);
  });
  return map;
}

function applySourceDraftMap(sourceRows) {
  if (!sourceRows || typeof sourceRows !== 'object') return;
  Object.entries(sourceRows).forEach(([key, links]) => {
    const cell = document.querySelector(`.cell.source-row[data-source-cell-key="${key}"]`);
    if (!cell) return;
    renderSourceCellContent(cell, Array.isArray(links) ? links : []);
  });
}

function setStatus(text) {
  if (editorStatus) editorStatus.textContent = text;
}

function nowLabel() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}

function queueAutoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveDraft(false);
    setStatus(`자동 저장됨 (${nowLabel()})`);
  }, 500);
}

function setEditMode(enabled) {
  editEnabled = enabled;
  document.body.classList.toggle('edit-enabled', enabled);
  getEditableNodes().forEach((node) => {
    const isRichTouchAction = node.classList.contains('desc-touch-action');
    node.classList.toggle('editable', !isRichTouchAction);
    node.setAttribute('contenteditable', enabled && !isRichTouchAction ? 'plaintext-only' : 'false');
    node.setAttribute('spellcheck', 'false');
  });
  if (toggleEditBtn) toggleEditBtn.textContent = enabled ? '편집 잠금' : '편집 잠금 해제';
  setStatus(`편집 모드: ${enabled ? 'ON' : 'OFF'}`);
}

function saveDraft(manual = false) {
  const payload = {
    version: 'v29',
    type: activeBlueprintType,
    nodes: serializeEditableNodes(),
    sourceRows: getSourceDraftMap(),
    structure: getStructureDraftPayload()
  };
  localStorage.setItem(getDraftKey(), JSON.stringify(payload));
  if (manual) {
    setStatus(`수동 저장 완료 (${nowLabel()})`);
  }
}

function exportCurrentHtml() {
  const payload = {
    version: "v29",
    type: activeBlueprintType,
    nodes: serializeEditableNodes(),
    sourceRows: getSourceDraftMap(),
    structure: getStructureDraftPayload()
  };

  const clone = document.documentElement.cloneNode(true);
  const seedScript = document.createElement("script");
  seedScript.textContent =
    "(function(){try{localStorage.setItem(" +
    JSON.stringify(getDraftKey()) +
    "," +
    JSON.stringify(JSON.stringify(payload)) +
    ");}catch(_e){}})();";

  const firstScript = clone.querySelector("script");
  if (firstScript && firstScript.parentNode) {
    firstScript.parentNode.insertBefore(seedScript, firstScript);
  } else if (clone.querySelector("body")) {
    clone.querySelector("body").appendChild(seedScript);
  }

  const htmlText = "<!DOCTYPE html>\n" + clone.outerHTML;
  const blob = new Blob([htmlText], { type: "text/html;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const stamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-");
  a.href = url;
  const variantLabel = (BLUEPRINT_VARIANTS[activeBlueprintType]?.label || activeBlueprintType).replace(/\s+/g, "_");
  a.download = "deobada_service_blueprint_v29_" + variantLabel + "_export_" + stamp + ".html";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  setStatus("내보내기 완료 (" + nowLabel() + ")");
}

function loadDraft(options = {}) {
  const raw = localStorage.getItem(getDraftKey());
  if (!raw) return false;
  try {
    const payload = JSON.parse(raw);
    if (!payload || payload.version !== 'v29') return false;
    if (payload.type && payload.type !== activeBlueprintType) return false;
    if (
      activeBlueprintType === 'refund3y' &&
      payload.structure &&
      Array.isArray(payload.structure.stages) &&
      payload.structure.stages.length < 19
    ) {
      localStorage.removeItem(getDraftKey());
      return false;
    }
    if (payload.structure && typeof payload.structure === 'object') {
      const anchor = options.anchor || captureScrollAnchor();
      applyStructureDraftPayload(payload.structure, { anchor });
    }

    if (!applyEditableNodeSnapshot(payload.nodes)) {
      localStorage.removeItem(getDraftKey());
      return false;
    }
    applySourceDraftMap(payload.sourceRows);
    setStatus(`저장본 불러옴 (${nowLabel()})`);
    return true;
  } catch (_err) {
    return false;
  }
}

if (toggleEditBtn) {
  toggleEditBtn.addEventListener('click', () => {
    setEditMode(!editEnabled);
    if (!editEnabled) saveDraft(false);
  });
}

if (toggleStageEditBtn) {
  toggleStageEditBtn.addEventListener('click', () => {
    setStageEditMode(!stageEditEnabled);
    saveDraft(false);
    setStatus(`단계 편집 모드: ${stageEditEnabled ? 'ON' : 'OFF'}`);
  });
}

if (saveDraftBtn) {
  saveDraftBtn.addEventListener('click', () => saveDraft(true));
}

if (resetDraftBtn) {
  resetDraftBtn.addEventListener('click', () => {
    localStorage.removeItem(getDraftKey());
    switchBlueprint(activeBlueprintType);
    setEditMode(editEnabled);
    setStatus(`기본값 복원 완료 (${nowLabel()})`);
  });
}

if (exportHtmlBtn) {
  exportHtmlBtn.addEventListener('click', exportCurrentHtml);
}

document.addEventListener('input', (event) => {
  if (!editEnabled) return;
  const target = event.target;
  if (!(target instanceof Element)) return;
  if (!target.matches(EDITABLE_SELECTOR)) return;

  const phaseCell = target.closest('.phase-cell[data-stage-index]');
  if (phaseCell) {
    const stageIndex = Number(phaseCell.dataset.stageIndex);
    if (Number.isFinite(stageIndex) && stageIndex >= 0 && stageIndex < stages.length) {
      if (target.classList.contains('phase-id')) {
        const value = (target.textContent || '').trim();
        if (value) stages[stageIndex].idLabel = value;
      }
      if (target.classList.contains('phase-name')) {
        const value = (target.textContent || '').trim();
        if (value) stages[stageIndex].name = value;
      }
      syncLegacyFromNormalizedState();
    }
  }
  queueAutoSave();
});

document.addEventListener('click', (event) => {
  const target = event.target;
  if (!(target instanceof Element)) return;

  const stageActionBtn = target.closest('.stage-action-btn');
  if (stageActionBtn) {
    event.preventDefault();
    if (!stageEditEnabled) return;
    const stageCell = stageActionBtn.closest('.phase-cell[data-stage-index]');
    if (!stageCell) return;
    const stageIndex = Number(stageCell.dataset.stageIndex);
    if (!Number.isFinite(stageIndex)) return;
    const action = stageActionBtn.dataset.action;
    if (action === 'drag-stage') return;

    if (action === 'add-stage') {
      const anchor = captureScrollAnchor() || {};
      if (addStageAfterIndex(stageIndex)) {
        anchor.stageKey = stages[stageIndex + 1]?.key || anchor.stageKey || '';
        anchor.stageIndex = stageIndex + 1;
        rebuildAfterStageStructureChange(anchor);
        setEditMode(editEnabled);
        queueAutoSave();
        setStatus(`단계 추가 완료 (${nowLabel()})`);
      }
      return;
    }

    if (action === 'remove-stage') {
      if (stages.length <= 1) {
        setStatus('최소 1개 단계는 유지되어야 합니다.');
        return;
      }
      const ok = window.confirm('이 단계를 삭제하시겠습니까? 해당 열의 모든 레인 데이터가 함께 삭제됩니다.');
      if (!ok) return;
      const anchor = captureScrollAnchor() || {};
      const fallbackIndex = Math.max(0, stageIndex - 1);
      anchor.stageKey = stages[fallbackIndex]?.key || anchor.stageKey || '';
      anchor.stageIndex = fallbackIndex;
      if (removeStageAtIndex(stageIndex)) {
        rebuildAfterStageStructureChange(anchor);
        setEditMode(editEnabled);
        queueAutoSave();
        setStatus(`단계 삭제 완료 (${nowLabel()})`);
      }
      return;
    }
  }

  const removeBtn = target.closest('.source-remove-btn');
  if (removeBtn) {
    event.preventDefault();
    if (!editEnabled) return;
    const cell = removeBtn.closest('.cell.source-row');
    if (!cell) return;
    const removeIndex = Number(removeBtn.dataset.index);
    const links = getSourceLinksFromCell(cell);
    if (Number.isNaN(removeIndex) || removeIndex < 0 || removeIndex >= links.length) return;
    links.splice(removeIndex, 1);
    renderSourceCellContent(cell, links);
    queueAutoSave();
    return;
  }

  const addBtn = target.closest('.source-add-btn');
  if (addBtn) {
    event.preventDefault();
    if (!editEnabled) return;
    const cell = addBtn.closest('.cell.source-row');
    if (!cell) return;

    const urlInput = window.prompt('노션 링크 URL을 입력하세요.');
    if (!urlInput || !urlInput.trim()) return;
    const normalizedUrl = normalizeSourceUrl(urlInput);
    const autoTitle = deriveSourceTitleFromUrl(normalizedUrl);

    const links = getSourceLinksFromCell(cell);
    links.push([autoTitle, normalizedUrl]);
    renderSourceCellContent(cell, links);
    queueAutoSave();
  }
});

function clearDropTargets() {
  Array.from(grid.querySelectorAll('.phase-cell.drop-target')).forEach((cell) => {
    cell.classList.remove('drop-target');
  });
}

if (grid) {
  grid.addEventListener('dragstart', (event) => {
    if (!stageEditEnabled) return;
    const target = event.target;
    if (!(target instanceof Element)) return;
    const phaseCell = target.closest('.phase-cell.stage-editable[data-stage-key]');
    if (!phaseCell) return;
    draggingStageKey = phaseCell.dataset.stageKey || null;
    phaseCell.classList.add('dragging');
    if (event.dataTransfer) {
      event.dataTransfer.effectAllowed = 'move';
      event.dataTransfer.setData('text/plain', draggingStageKey || '');
    }
  });

  grid.addEventListener('dragover', (event) => {
    if (!stageEditEnabled || !draggingStageKey) return;
    const target = event.target;
    if (!(target instanceof Element)) return;
    const overCell = target.closest('.phase-cell.stage-editable[data-stage-key]');
    if (!overCell) return;
    const fromIndex = getStageIndexByKey(draggingStageKey);
    const toIndex = Number(overCell.dataset.stageIndex);
    if (!Number.isFinite(fromIndex) || !Number.isFinite(toIndex) || fromIndex < 0 || toIndex < 0) return;
    if (stages[fromIndex]?.phaseKey !== stages[toIndex]?.phaseKey) return;
    event.preventDefault();
    clearDropTargets();
    overCell.classList.add('drop-target');
    if (event.dataTransfer) event.dataTransfer.dropEffect = 'move';
  });

  grid.addEventListener('drop', (event) => {
    if (!stageEditEnabled || !draggingStageKey) return;
    event.preventDefault();
    const target = event.target;
    if (!(target instanceof Element)) return;
    const dropCell = target.closest('.phase-cell.stage-editable[data-stage-key]');
    if (!dropCell) return;

    const fromIndex = getStageIndexByKey(draggingStageKey);
    const toIndex = Number(dropCell.dataset.stageIndex);
    if (!Number.isFinite(fromIndex) || !Number.isFinite(toIndex)) return;
    if (fromIndex === toIndex) return;

    const anchor = captureScrollAnchor() || {};
    anchor.stageKey = draggingStageKey;
    anchor.stageIndex = toIndex;

    if (moveStageWithinPhase(fromIndex, toIndex)) {
      rebuildAfterStageStructureChange(anchor);
      setEditMode(editEnabled);
      queueAutoSave();
      setStatus(`단계 이동 완료 (${nowLabel()})`);
    }
  });

  grid.addEventListener('dragend', (event) => {
    const target = event.target;
    if (target instanceof Element) {
      const phaseCell = target.closest('.phase-cell.stage-editable[data-stage-key]');
      if (phaseCell) phaseCell.classList.remove('dragging');
    }
    clearDropTargets();
    draggingStageKey = null;
  });
}

viewButtons.forEach((btn) => {
  btn.addEventListener('click', () => {
    const nextType = btn.dataset.viewType;
    if (!nextType || nextType === activeBlueprintType) return;
    const anchor = captureScrollAnchor();
    saveDraft(false);
    switchBlueprint(nextType, { anchor });
    setEditMode(editEnabled);
    loadDraft({ anchor });
    setStatus(`유형 전환: ${BLUEPRINT_VARIANTS[nextType]?.label || nextType}`);
  });
});

switchBlueprint('refund3y');
if (toggleStageEditBtn) toggleStageEditBtn.textContent = '단계 편집: OFF';
setEditMode(true);
[
  'deobada_blueprint_v23_inline_draft',
  'deobada_blueprint_v25_inline_draft',
  'deobada_blueprint_v26_inline_draft',
  'deobada_blueprint_v27_inline_draft',
  'deobada_blueprint_v28_inline_draft__refund3y',
  'deobada_blueprint_v28_inline_draft__easyClaim',
  'deobada_blueprint_v28_inline_draft__referral'
].forEach((key) => localStorage.removeItem(key));
loadDraft();
</script>
